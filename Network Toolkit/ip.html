<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IT Admin Console</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="console">
        <h1>> IT_Network_Tool v1.0</h1>
        <hr>
        <div id="status-card">
            <p>Connection Status: <span id="online-status">Checking...</span></p>
            <p>Last Sync: <span id="time-stamp">00:00:00</span></p>
        </div>
        
        <div class="tools">
            <button onclick="checkConnection()">Ping Network</button>
            <button onclick="clearLogs()">Clear Console</button>
        </div>

        <div id="log-window">
            <p class="system-msg">[SYSTEM] Initializing diagnostics...</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
